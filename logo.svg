<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#4b0082" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background hex structure -->
  <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" fill="none" stroke="url(#neonGradient)" stroke-width="2.5" opacity="0.3"/>
  <polygon points="50,22 74,36 74,64 50,78 26,64 26,36" fill="none" stroke="url(#neonGradient)" stroke-width="1.5" opacity="0.6"/>
  <!-- Central Glowing Nodes -->
  <circle cx="50" cy="50" r="10" fill="url(#neonGradient)" filter="url(#neonGlow)" />
  <circle cx="50" cy="25" r="4" fill="#00ffff" />
  <circle cx="71.6" cy="62.5" r="4" fill="#8a2be2" />
  <circle cx="28.4" cy="62.5" r="4" fill="#8a2be2" />
  <!-- Node connecting lines -->
  <line x1="50" y1="29" x2="50" y2="40" stroke="#00ffff" stroke-width="2" stroke-dasharray="1 1"/>
  <line x1="68" y1="60" x2="58" y2="55" stroke="#8a2be2" stroke-width="2" />
  <line x1="32" y1="60" x2="42" y2="55" stroke="#8a2be2" stroke-width="2" />
</svg>
