apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omnisolve-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: omnisolve.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: omnisolve-service
            port:
              number: 80
  - host: prometheus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
  - host: grafana.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
