<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniSolve AI - Real-Time Diagnostics & Problem Solving Chatbot</title>
  <meta name="description" content="OmniSolve AI is an advanced troubleshooting companion providing real-time checklists, diagnostic guides, and solution mapping for coding, system, and DIY issues.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="logo.svg" alt="OmniSolve Logo" class="logo-icon">
        <span class="logo-text">OmniSolve AI</span>
      </div>

      <!-- Domain Navigation -->
      <nav class="domain-selector">
        <div class="domain-title">Solve Domains</div>
        <button class="domain-btn active" data-domain="code">
          <span class="icon">💻</span> Code Debugger
        </button>
        <button class="domain-btn" data-domain="network">
          <span class="icon">🌐</span> Network Support
        </button>
        <button class="domain-btn" data-domain="diy">
          <span class="icon">🔧</span> DIY & Tech Repair
        </button>
      </nav>

      <!-- History List -->
      <div class="history-section">
        <div class="history-title">Recent Tickets</div>
        <div class="history-list" id="historyList">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Footer Info -->
      <div class="sidebar-footer">
        <span>v1.2.0 (Stable)</span>
        <span>Secure Local Agent</span>
      </div>
    </aside>

    <!-- Main Chat Arena -->
    <main class="chat-arena">
      <!-- Chat Header -->
      <header class="chat-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <!-- Hamburger Menu for Mobile -->
          <button class="btn-icon menu-toggle" id="menuToggle">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          
          <div class="header-meta">
            <h1 class="header-title" id="chatTitle">Code Debugger Agent</h1>
            <div class="header-subtitle">
              <span class="status-dot"></span>
              <span id="agentStatus">Awaiting stack trace...</span>
            </div>
          </div>
        </div>

        <div class="header-actions">
          <button class="btn-icon" id="clearChatBtn" title="Clear Conversation">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Chat viewport for messages -->
      <section class="message-viewport" id="messageViewport">
        <!-- Rendered by JS -->
      </section>

      <!-- Input Area -->
      <footer class="input-area">
        <!-- Quick Action Suggestion Chips -->
        <div class="quick-suggestions" id="quickSuggestions">
          <!-- Rendered dynamically by JS -->
        </div>

        <div class="input-container">
          <textarea class="chat-input" id="chatInput" placeholder="Describe the error, code, or issue you're facing..." rows="1"></textarea>
          <button class="btn-send" id="btnSend">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
